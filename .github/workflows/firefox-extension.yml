name: Firefox extension

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "extension/**"
      - "src/lookupCore.ts"
      - "src/panelHtml.ts"
      - "src/types.ts"
      - "tsup.extension.config.ts"
      - "scripts/build-extension.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/firefox-extension.yml"
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Build extension bundle
        run: npm run build:extension

      - name: Zip unpacked extension
        run: (cd extension/dist && zip -r ../firefox-extension.zip .)

      - name: Upload unsigned extension (for manual AMO upload)
        uses: actions/upload-artifact@v4
        with:
          name: firefox-extension-unsigned-zip
          path: extension/firefox-extension.zip

      - name: Sign with web-ext (optional)
        id: sign
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          mkdir -p extension/artifacts
          if [ -z "$WEB_EXT_API_KEY" ] || [ -z "$WEB_EXT_API_SECRET" ]; then
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::WEB_EXT_API_KEY / WEB_EXT_API_SECRET not set — skipping AMO signing. Upload the unsigned zip from artifacts for your first AMO submission, then add secrets for automated signing."
            exit 0
          fi
          npx web-ext sign --source-dir=extension/dist --artifacts-dir=extension/artifacts
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Upload signed XPI (when signing ran)
        if: steps.sign.outputs.signed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: firefox-extension-signed-xpi
          path: extension/artifacts/*.xpi
