name: Build Userscript

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build userscript
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: userscript
          path: dist/userscript.user.js

      - name: Publish latest userscript branch file
        if: github.ref_name == 'main'
        run: |
          mkdir -p published
          cp dist/userscript.user.js published/latest.user.js
          cp dist/userscript.user.js published/install.user.js

      - name: Commit published script
        if: github.ref_name == 'main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update latest userscript artifact"
          file_pattern: published/*.user.js
